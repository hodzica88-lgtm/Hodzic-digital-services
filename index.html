<!-- SLIDER SCRIPT -->
<script>
document.querySelectorAll('.slider').forEach(slider => {
  const images = slider.dataset.images.split(',');
  let index = 0;

  slider.style.backgroundImage = `url(${images[index]})`;

  setInterval(() => {
    index = (index + 1) % images.length;
    slider.style.backgroundImage = `url(${images[index]})`;
  }, 2500);
});
</script>
