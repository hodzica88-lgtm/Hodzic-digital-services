<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hodzic Digital Services</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      line-height: 1.5;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .hero-content {
      max-width: 900px;
    }

    .hero-eyebrow {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.75;
    }

    .hero h1 {
      font-size: clamp(38px, 6vw, 72px);
      line-height: 1.05;
      margin-bottom: 24px;
    }

    .hero p {
      max-width: 700px;
      margin: 0 auto 32px;
      font-size: 18px;
      color: #333333;
    }

    .hero-buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #111111;
      color: #ffffff;
    }

    .btn-secondary {
      border: 1px solid #111111;
      color: #111111;
      background: transparent;
    }

    .btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <div class="hero-eyebrow">Hodzic Digital Services</div>
      <h1>Websites, die Anfragen bringen – nicht nur gut aussehen</h1>
      <p>
        Ich helfe lokalen Betrieben, online mehr Anfragen zu bekommen und sorge dafür,
        dass keine Anfrage verloren geht.
      </p>
      <div class="hero-buttons">
        <a href="#kontakt" class="btn btn-primary">Website anfragen</a>
        <a href="https://smartflow-automations.de" class="btn btn-secondary">SmartFlow ansehen</a>
      </div>
    </div>
  </section>
</body>
</html>
